<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>케이스수학과학학원 업무 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2d42;
    --navy-light: #243d58;
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --gold-pale: #f5e8c0;
    --white: #f8f6f0;
    --gray: #8a9bb0;
    --gray-light: #b8c9d9;
    --green: #4caf7d;
    --sidebar-width: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy);
    color: var(--white);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-width);
    background: linear-gradient(180deg, #0a1520 0%, #0d1b2a 100%);
    border-right: 1px solid rgba(201,168,76,0.2);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1.1;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .date-display {
    margin-top: 12px;
    font-size: 11px;
    color: var(--gray);
    background: rgba(255,255,255,0.04);
    padding: 6px 10px;
    border-radius: 6px;
  }

  .nav-section-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gray);
    padding: 16px 20px 6px;
    text-transform: uppercase;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    position: relative;
  }

  .nav-item:hover { background: rgba(201,168,76,0.06); }

  .nav-item.active {
    background: rgba(201,168,76,0.1);
    border-left-color: var(--gold);
  }

  .nav-item .nav-icon {
    font-size: 16px;
    width: 22px;
    text-align: center;
  }

  .nav-item .nav-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-light);
    flex: 1;
  }

  .nav-item.active .nav-label { color: var(--gold-light); }

  .nav-progress-pill {
    font-size: 10px;
    background: rgba(76,175,125,0.2);
    color: var(--green);
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
  }

  .nav-progress-pill.done {
    background: rgba(76,175,125,0.35);
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  .reset-btn {
    width: 100%;
    padding: 9px;
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.25);
    color: #ff8080;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    background: rgba(255,80,80,0.2);
    border-color: rgba(255,80,80,0.5);
  }

  /* ── MAIN ── */
  #main {
    margin-left: var(--sidebar-width);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: rgba(10,21,32,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .page-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
  }

  .page-title span {
    color: var(--gold);
  }

  .overall-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .overall-label {
    font-size: 12px;
    color: var(--gray);
  }

  .overall-bar-wrap {
    width: 120px;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .overall-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--green));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .overall-pct {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    min-width: 36px;
  }

  /* ── CONTENT ── */
  .content {
    padding: 32px;
    max-width: 860px;
    display: none;
  }

  .content.active { display: block; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .section-icon {
    font-size: 32px;
  }

  .section-info h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
  }

  .section-info p {
    font-size: 12px;
    color: var(--gray);
    margin-top: 3px;
  }

  .section-total-progress {
    margin-left: auto;
    text-align: right;
  }

  .section-total-progress .pct-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
  }

  .section-total-progress .pct-label {
    font-size: 11px;
    color: var(--gray);
  }

  /* ── CHECKLIST GROUP ── */
  .cl-group {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .cl-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: rgba(201,168,76,0.06);
    border-bottom: 1px solid rgba(201,168,76,0.12);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .cl-group-header:hover {
    background: rgba(201,168,76,0.1);
  }

  .cl-group-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cl-group-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cl-group-prog-text {
    font-size: 12px;
    color: var(--gray);
  }

  .cl-group-prog-wrap {
    width: 80px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .cl-group-prog-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 10px;
    transition: width 0.3s ease;
  }

  .cl-group-prog-fill.complete {
    background: var(--green);
  }

  .cl-group-toggle {
    font-size: 12px;
    color: var(--gray);
    transition: transform 0.2s;
  }

  .cl-group.collapsed .cl-group-toggle { transform: rotate(-90deg); }

  .cl-items {
    padding: 8px 0;
  }

  .cl-group.collapsed .cl-items { display: none; }

  .cl-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .cl-item:hover { background: rgba(255,255,255,0.03); }

  .cl-item.checked {
    opacity: 0.55;
  }

  .cl-checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(201,168,76,0.4);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .cl-item.checked .cl-checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .cl-checkbox::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: none;
  }

  .cl-item.checked .cl-checkbox::after { display: block; }

  .cl-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--gray-light);
    flex: 1;
  }

  .cl-item.checked .cl-text {
    text-decoration: line-through;
    color: var(--gray);
  }

  .cl-note {
    font-size: 12px;
    background: rgba(201,168,76,0.08);
    border-left: 3px solid var(--gold);
    padding: 10px 14px;
    margin: 4px 20px 8px 54px;
    border-radius: 0 8px 8px 0;
    color: var(--gold-pale);
    line-height: 1.6;
  }

  /* ── MOBILE HAMBURGER ── */
  #hamburger {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 200;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 18px;
  }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #sidebar {
      transform: translateX(-100%);
    }
    #sidebar.open {
      transform: translateX(0);
    }
    #main {
      margin-left: 0;
    }
    #hamburger { display: block; }
    #overlay.visible { display: block; }
    .topbar { padding: 14px 16px 14px 56px; }
    .content { padding: 20px 16px; }
    .overall-progress { display: none; }
  }
</style>
</head>
<body>

<button id="hamburger" onclick="toggleSidebar()">☰</button>
<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-header">
    <div class="brand">CASE<br>ACADEMY</div>
    <div class="brand-sub">케이스수학과학학원</div>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <div class="nav-section-label">체크리스트 메뉴</div>
  <div id="navItems"></div>

  <div class="sidebar-footer">
    <button class="reset-btn" onclick="confirmReset()">🔄 오늘 체크리스트 초기화</button>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div class="page-title">업무 <span>체크리스트</span></div>
    <div class="overall-progress">
      <span class="overall-label">전체 진행률</span>
      <div class="overall-bar-wrap">
        <div class="overall-bar-fill" id="overallBar" style="width:0%"></div>
      </div>
      <span class="overall-pct" id="overallPct">0%</span>
    </div>
  </div>

  <div id="contentArea"></div>
</div>

<script>
const DATA = [
  {

          { text: '대기 중 볼 수 있는 학원 안내문, 학생 노트, 교육 자료를 안내했나요?' },

          { text: '부모님 요구사항을 점검하고 학원 교육서비스와 비교하여 학생 발전을 위해 노력하겠다는 의지를 전달했나요?' },

// ── STATE ──
function getStorageKey() {
  const d = new Date();
  return `case_cl_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(getStorageKey());
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveState(state) {
  try {
    localStorage.setItem(getStorageKey(), JSON.stringify(state));
  } catch(e) {}
}

let state = loadState();
let currentPage = DATA[0].id;

// ── PROGRESS CALC ──
function calcProgress(sectionId) {
  const sec = DATA.find(d => d.id === sectionId);
  if (!sec) return {done:0, total:0};
  let total = 0, done = 0;
  sec.groups.forEach(g => {
    g.items.forEach(item => {
      total++;
      const key = `${sectionId}__${g.title}__${item.text.substring(0,30)}`;
      if (state[key]) done++;
    });
  });
  return {done, total};
}

function calcOverall() {
  let total = 0, done = 0;
  DATA.forEach(sec => {
    const p = calcProgress(sec.id);
    total += p.total; done += p.done;
  });
  return {done, total};
}

// ── RENDER NAV ──
function renderNav() {
  const container = document.getElementById('navItems');
  container.innerHTML = '';
  DATA.forEach(sec => {
    const {done, total} = calcProgress(sec.id);
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    const div = document.createElement('div');
    div.className = 'nav-item' + (sec.id === currentPage ? ' active' : '');
    div.onclick = () => { currentPage = sec.id; render(); closeSidebar(); };
    div.innerHTML = `
      <span class="nav-icon">${sec.icon}</span>
      <span class="nav-label">${sec.label}</span>
      <span class="nav-progress-pill ${pct===100?'done':''}">${pct}%</span>
    `;
    container.appendChild(div);
  });
}

// ── RENDER OVERALL ──
function renderOverall() {
  const {done, total} = calcOverall();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('overallBar').style.width = pct + '%';
  document.getElementById('overallPct').textContent = pct + '%';
}

// ── RENDER CONTENT ──
function renderContent() {
  const area = document.getElementById('contentArea');
  area.innerHTML = '';

  DATA.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'content' + (sec.id === currentPage ? ' active' : '');
    div.id = 'page_' + sec.id;

    const {done, total} = calcProgress(sec.id);
    const pct = total > 0 ? Math.round(done/total*100) : 0;

    let groupsHtml = '';
    sec.groups.forEach((g, gi) => {
      let gdone = 0, gtotal = 0;
      let itemsHtml = '';
      g.items.forEach((item, ii) => {
        const key = `${sec.id}__${g.title}__${item.text.substring(0,30)}`;
        const checked = !!state[key];
        gtotal++;
        if (checked) gdone++;
        itemsHtml += `
          <div class="cl-item ${checked ? 'checked' : ''}" onclick="toggleItem('${sec.id}','${g.title}','${item.text.substring(0,30).replace(/'/g,"\\'")}','${sec.id}_${gi}_${ii}')">
            <div class="cl-checkbox"></div>
            <div class="cl-text">${item.text}</div>
          </div>
          ${item.note ? `<div class="cl-note">📌 ${item.note}</div>` : ''}
        `;
      });
      const gpct = gtotal > 0 ? Math.round(gdone/gtotal*100) : 0;
      groupsHtml += `
        <div class="cl-group" id="grp_${sec.id}_${gi}">
          <div class="cl-group-header" onclick="toggleGroup('grp_${sec.id}_${gi}')">
            <div class="cl-group-title">
              <span>${gdone === gtotal && gtotal > 0 ? '✅' : '◎'}</span>
              ${g.title}
            </div>
            <div class="cl-group-meta">
              <span class="cl-group-prog-text">${gdone}/${gtotal}</span>
              <div class="cl-group-prog-wrap">
                <div class="cl-group-prog-fill ${gpct===100?'complete':''}" style="width:${gpct}%"></div>
              </div>
              <span class="cl-group-toggle">▾</span>
            </div>
          </div>
          <div class="cl-items">${itemsHtml}</div>
        </div>
      `;
    });

    div.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${sec.icon}</div>
        <div class="section-info">
          <h2>${sec.label}</h2>
          <p>${sec.desc}</p>
        </div>
        <div class="section-total-progress">
          <div class="pct-num">${pct}<span style="font-size:20px">%</span></div>
          <div class="pct-label">${done}/${total} 완료</div>
        </div>
      </div>
      ${groupsHtml}
    `;
    area.appendChild(div);
  });
}

// ── TOGGLE ITEM ──
function toggleItem(secId, groupTitle, itemKey, elemId) {
  const key = `${secId}__${groupTitle}__${itemKey}`;
  state[key] = !state[key];
  saveState(state);
  render();
}

function toggleGroup(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

// ── FULL RENDER ──
function render() {
  renderNav();
  renderOverall();
  renderContent();
}

// ── DATE ──
function setDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}

// ── RESET ──
function confirmReset() {
  if (confirm('오늘 체크리스트를 모두 초기화 하시겠습니까?')) {
    state = {};
    saveState(state);
    render();
  }
}

// ── SIDEBAR MOBILE ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ── INIT ──
setDate();
render();
</script>
