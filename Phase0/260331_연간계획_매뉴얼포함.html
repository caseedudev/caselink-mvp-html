            h('h3',{style:{fontSize:13.5,fontWeight:700,color:dept.color,margin:0}},cat.cat)
          ),
          h('div',{style:{display:'flex',flexDirection:'column',gap:3,paddingLeft:6}},
            cat.items.map(function(item,ii){
              var k=ci+'-'+ii, isE=exp===k;
              return h('div',{key:ii},
                h('div',{onClick:function(){setExp(isE?null:k);},style:{padding:'11px 14px',borderRadius:8,cursor:'pointer',background:'#fff',border:'1px solid '+(isE?dept.color+'50':'#e2e8f0'),boxShadow:isE?'0 0 0 2px '+dept.color+'18':'0 1px 2px rgba(0,0,0,0.02)',transition:'all 0.15s',display:'flex',alignItems:'center',justifyContent:'space-between'}},
                  h('span',{style:{fontSize:13,fontWeight:600,color:'#1e293b'}},item.name),
                  h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
                    item.cycle?h('span',{style:{fontSize:10.5,padding:'2px 7px',borderRadius:4,background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',fontWeight:500}},item.cycle):null,
                    item.timing?h('span',{style:{fontSize:10.5,padding:'2px 7px',borderRadius:4,background:dept.color+'10',color:dept.color,fontWeight:600}},item.timing):null,
                    h('span',{style:{fontSize:14,color:'#94a3b8',transition:'transform 0.2s',transform:isE?'rotate(180deg)':'rotate(0deg)'}},'▾')
                  )
                ),
                isE?h('div',{style:{margin:'3px 0 6px',padding:18,borderRadius:10,background:'#f8fafc',border:'1px solid '+dept.color+'20'}},
                  h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}},
                    [{l:'📅 시기',f:'timing'},{l:'🔄 주기',f:'cycle'},{l:'👤 담당자',f:'manager'},{l:'🎯 목적',f:'purpose'}].map(function(x){
                      return h('div',{key:x.f},
                        h('label',{style:{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5,display:'block'}},x.l),
                        h('input',{value:item[x.f],onChange:function(e){upd(ci,ii,x.f,e.target.value);},style:{width:'100%',padding:'9px 11px',borderRadius:7,border:'1px solid #e2e8f0',background:'#fff',color:'#1e293b',fontSize:13,outline:'none',fontFamily:'inherit'}})
                      );
                    }),
                    [{l:'📝 세부사항',f:'details'},{l:'💡 개선사항',f:'imp'}].map(function(x){
                      return h('div',{key:x.f,style:{gridColumn:'1/-1'}},
                        h('label',{style:{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5,display:'block'}},x.l),
                        h('textarea',{value:item[x.f],onChange:function(e){upd(ci,ii,x.f,e.target.value);},rows:3,placeholder:x.f==='imp'?'개선사항을 입력하세요...':'',style:{width:'100%',padding:'9px 11px',borderRadius:7,border:'1px solid #e2e8f0',background:'#fff',color:'#1e293b',fontSize:13,outline:'none',resize:'vertical',fontFamily:'inherit'}})
                      );
                    })
                  )
                ):null
              );
            })
          )
        );
      })
    );
  }

  // ── Monthly Plan ──
  function renderMP(){
    var mp=dd.mp;
    if(!mp||(!mp.u.length&&!mp.l.length)) return null;
    return h('section',{style:{marginBottom:24}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
        h('div',{style:{width:4,height:22,borderRadius:2,background:dept.color}}),
        h('h2',{style:{fontSize:17,fontWeight:700,color:'#0f172a',margin:0}},'2026 연간 액션 플랜'),
        h('span',{style:{fontSize:11,color:'#94a3b8',marginLeft:6,fontWeight:400}},'카드를 클릭하면 수정할 수 있습니다')
      ),
      ['u','l'].map(function(half){
        var items=mp[half]; if(!items.length) return null;
        return h('div',{key:half},
          h('h3',{style:{fontSize:12.5,fontWeight:700,color:'#94a3b8',marginBottom:8,paddingLeft:4}},half==='u'?'상반기 (1~6월)':'하반기 (7~12월)'),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8,marginBottom:18}},
            items.map(function(mi,i){
              var ek=half+'-'+i;
              var isEdit=editMP===ek;
              return h('div',{key:i,
                onClick:function(e){if(!isEdit){setEditMP(ek);}},
                style:{padding:'13px 15px',borderRadius:10,background:'#fff',border:'1px solid '+(isEdit?dept.color+'60':'#e2e8f0'),minHeight:110,boxShadow:isEdit?'0 0 0 2px '+dept.color+'18':'0 1px 2px rgba(0,0,0,0.03)',cursor:isEdit?'default':'pointer',transition:'all 0.15s'}},
                h('div',{style:{fontSize:13,fontWeight:700,color:dept.color,marginBottom:7,paddingBottom:5,borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                  h('span',null,mi.m),
                  isEdit?h('button',{onClick:function(e){e.stopPropagation();setEditMP(null);},style:{fontSize:11,padding:'2px 8px',borderRadius:4,border:'1px solid #e2e8f0',background:'#f8fafc',color:'#64748b',cursor:'pointer',fontFamily:'inherit'}},'완료'):h('span',{style:{fontSize:11,color:'#cbd5e1'}},'✏️')
                ),
                isEdit?
                  h('textarea',{
                    autoFocus:true,
                    value:mi.c,
                    onChange:function(e){updMP(half,i,e.target.value);},
                    onKeyDown:function(e){if(e.key==='Escape'){setEditMP(null);}},
                    style:{width:'100%',minHeight:80,padding:'8px 0',border:'none',background:'transparent',color:'#1e293b',fontSize:12,lineHeight:1.7,outline:'none',resize:'vertical',fontFamily:'inherit'},
                    placeholder:'내용을 입력하세요...'
                  }):
                  h('div',{style:{fontSize:12,color:'#64748b',lineHeight:1.7,whiteSpace:'pre-line'}},mi.c||h('span',{style:{color:'#cbd5e1',fontStyle:'italic'}},'클릭하여 입력'))
              );
            })
          )
        );
      }),
      mp.r!==undefined?h('div',{style:{padding:'14px 18px',borderRadius:10,background:dept.color+'06',border:'1px solid '+dept.color+'18'}},
        h('div',{style:{fontSize:12,fontWeight:700,color:dept.color,marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('span',null,'📌 매월 진행 사항'),
          editMP==='recurring'?
            h('button',{onClick:function(){setEditMP(null);},style:{fontSize:11,padding:'2px 8px',borderRadius:4,border:'1px solid #e2e8f0',background:'#fff',color:'#64748b',cursor:'pointer',fontFamily:'inherit'}},'완료'):
            h('span',{onClick:function(){setEditMP('recurring');},style:{fontSize:11,color:'#94a3b8',cursor:'pointer'}},'✏️ 수정')
        ),
        editMP==='recurring'?
          h('textarea',{
            autoFocus:true,
            value:mp.r,
            onChange:function(e){updMPR(e.target.value);},
            onKeyDown:function(e){if(e.key==='Escape'){setEditMP(null);}},
            rows:5,
            style:{width:'100%',padding:'8px 10px',borderRadius:7,border:'1px solid #e2e8f0',background:'#fff',color:'#1e293b',fontSize:12.5,lineHeight:1.8,outline:'none',resize:'vertical',fontFamily:'inherit'},
          }):
          h('div',{onClick:function(){setEditMP('recurring');},style:{fontSize:12.5,color:'#64748b',lineHeight:1.8,whiteSpace:'pre-line',cursor:'pointer'}},mp.r||'클릭하여 입력')
      ):null
    );
  }

  // ── Empty ──
  function renderEmpty(){
    if(dd.categories.length) return null;
    return h('div',{style:{textAlign:'center',padding:'60px 20px',color:'#94a3b8'}},
      h('div',{style:{fontSize:48,marginBottom:16}},'🚧'),
      h('div',{style:{fontSize:16,fontWeight:600,color:'#64748b',marginBottom:8}},'준비 중입니다'),
      h('div',{style:{fontSize:13}},'해당 부서의 연간계획이 업데이트되면 내용이 표시됩니다.')
    );
  }

  var footer=h('footer',{style:{padding:'14px 28px',borderTop:'1px solid #e2e8f0',background:'#fff',textAlign:'center'}},
    h('p',{style:{fontSize:11.5,color:'#94a3b8',margin:0}},'© 2026 케이스수학과학학원 · 연간계획 관리 시스템 v1.0')
  );

  return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',background:'#f8fafc',color:'#1e293b',fontFamily:"'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif"}},
    header,
    tabs,
    h('main',{style:{flex:1,padding:'24px 28px',maxWidth:1400,margin:'0 auto',width:'100%'}},
      dd.isPh?renderPhilosophy():[renderGoals(),renderCats(),renderMP(),renderEmpty()]
    ),
    footer
  );
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
