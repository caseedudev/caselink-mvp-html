const MONTHS_ORDER=['12월','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월'];

function expandSeed(arr){return arr.map(r=>({month:r.m,dept:r.d,name:r.n,startCount:r.sc,endCount:r.ec,dropCount:r.dc??0,dropRate:r.dr??0,attendance:r.att??null,managerEval:r.me??null,revenue:r.rev??0,salary:r.sal??0,salaryRevenueRatio:r.sr??0,evalScore:r.es}));}

const fmtPct=n=>n!=null?n.toFixed(1)+"%":"-";
const fmtScore=n=>n!=null?n.toFixed(2):"-";
const fmtMoney=n=>n!=null?"₩"+(n/10000).toLocaleString("ko-KR",{maximumFractionDigits:0})+"만":"-";
function scoreColor(s){if(s==null)return"#94a3b8";if(s<=0.7)return"#16a34a";if(s<=1.0)return"#3b82f6";if(s<=1.3)return"#f59e0b";return"#ef4444";}
function scoreBadge(s){if(s==null)return{color:"#94a3b8",bg:"#f1f5f9",label:"-",text:"-"};const c=scoreColor(s);const l=s<=0.7?"우수":s<=1.0?"양호":s<=1.3?"주의":"경고";return{color:c,bg:c+"15",label:l,text:l+" "+s.toFixed(2)};}
function avg(arr,key){const v=arr.filter(d=>d[key]!=null&&!isNaN(d[key]));if(!v.length)return null;return v.reduce((s,d)=>s+d[key],0)/v.length;}
function getTimeValue(y,m){const mi=MONTHS_ORDER.indexOf(m);const fy=mi===0?y-1:y;return fy*12+mi;}
function getTimeLabel(y,m){return `${String(y).slice(2)}.${m.replace('월','')}`;}

/* ═══ Upload parser (from App1) ═══ */
function parseUploadedText(text){
  const records=[];const lines=text.split("\n").map(l=>l.replace(/\r/g,"").split("\t"));
  let currentMonth="",currentDept="";
  for(const cells of lines){
    const headerMatch=cells.join(" ").match(/월별 강사 인원 보고\s*([\d.]+)/);
    if(headerMatch){let raw=headerMatch[1];
      if(/^\d\.\d+\.\d+$/.test(raw)){const p=raw.split(".");currentMonth=`20${p[0].padStart(2,"0")}${p[1]}-${p[2].padStart(2,"0")}`;}
      else if(/^\d{4}\.\d{2}$/.test(raw)){currentMonth=raw.replace(".","-");}
      else if(/^\d+\.\d+\.\d+$/.test(raw)){const p=raw.split(".");currentMonth=`20${p[0].padStart(2,"0")}${p[1]}-${p[2].padStart(2,"0")}`;}
      continue;}
    const deptNames=["초등부","중등부","고등부","영재원","과학과","광명관"];
    const foundDept=deptNames.find(d=>cells[0]?.trim()===d);
    if(foundDept){currentDept=foundDept;continue;}
    if(!currentMonth||!currentDept)continue;
    if(cells[0]?.trim()==="강사명"||cells[0]?.trim()===""){
      const name=cells[1]?.trim();
      if(!name||name==="강사명"||name==="부서총괄"||name==="총집계"||name.includes("총 합")||name.includes("총합")||name.includes("수학본원"))continue;
      const pn=s=>{if(!s)return null;const cl=s.replace(/[,\s원%₩"]/g,"").trim();if(cl===""||cl==="-"||cl.includes("DIV"))return null;const mm=cl.match(/^([+-]?\d+\.?\d*)/);return mm?parseFloat(mm[1]):null;};
      let dr=pn(cells[7])??0,sr=pn(cells[15])??0;
      if(dr>0&&dr<1)dr=Math.round(dr*1000)/10;
      if(sr>0&&sr<1)sr=Math.round(sr*1000)/10;
      const evalCol=cells.length>16?pn(cells[16]):(cells.length>15?pn(cells[15]):null);
      records.push({month:currentMonth,dept:currentDept,name,startCount:pn(cells[2])??0,endCount:pn(cells[3])??0,dropCount:pn(cells[6])??0,dropRate:dr,attendance:pn(cells[9]),managerEval:pn(cells[12]),revenue:pn(cells[13])??0,salary:pn(cells[14])??0,salaryRevenueRatio:sr,evalScore:evalCol});
    }
  }
  return records;
}

  const filteredInstr=useMemo(()=>{
    let d=instrData;
    if(monthFrom)d=d.filter(r=>r.month>=monthFrom);
    if(monthTo)d=d.filter(r=>r.month<=monthTo);
    return d;
  },[instrData,monthFrom,monthTo]);

  // Dept scores filtered by period
  const sortedScores=useMemo(()=>{
    let d=deptScores.filter(r=>r.총괄!=null);
    if(monthFrom||monthTo){
      d=d.filter(r=>{
        const mi=MONTHS_ORDER.indexOf(r.month);

        const mk=`${fy}-${mm}`;
        if(monthFrom&&mk<monthFrom)return false;
        if(monthTo&&mk>monthTo)return false;
        return true;
      });
    }
    return d.sort((a,b)=>getTimeValue(a.year,a.month)-getTimeValue(b.year,b.month));
  },[deptScores,monthFrom,monthTo]);

  const latestRec=sortedScores[sortedScores.length-1]||null;
  const prevRec=sortedScores.length>=2?sortedScores[sortedScores.length-2]:null;

  const getYoY=(dept)=>{
    if(!latestRec)return null;
    const ly=deptScores.find(r=>r.year===latestRec.year-1&&r.month===latestRec.month);
    if(!ly||ly[dept]==null||latestRec[dept]==null)return null;
    return latestRec[dept]-ly[dept];
  };

  // Upload handler
  const handleUpload=useCallback((records,fileName)=>{
    setInstrData(prev=>{
      const existing=new Set(prev.map(d=>`${d.month}|${d.dept}|${d.name}`));
      const newRecs=records.filter(r=>!existing.has(`${r.month}|${r.dept}|${r.name}`));
      const updated=[...prev];
      records.forEach(r=>{const k=`${r.month}|${r.dept}|${r.name}`;if(existing.has(k)){const i=updated.findIndex(d=>`${d.month}|${d.dept}|${d.name}`===k);if(i>=0)updated[i]=r;}});
      return[...updated,...newRecs];
    });
    setUploadLog(p=>[...p,{time:new Date().toLocaleString("ko-KR"),file:fileName,count:records.length}]);
  },[]);

  const NAV=[{key:"dashboard",icon:"📊",label:"대시보드"},{key:"chart",icon:"📈",label:"추이 차트"},{key:"instructor",icon:"👤",label:"강사 평가"},{key:"analysis",icon:"🔍",label:"분석"}];

  return(
    <div style={{minHeight:"100vh",background:"#f8fafc"}}>
      {/* ═══ Header ═══ */}

        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16,fontWeight:800}}>K</div>
            <div><h1 style={{fontSize:16,fontWeight:800,color:"#1e293b",letterSpacing:"-0.3px"}}>케이스학원 통합 평가 대시보드</h1><p style={{fontSize:10,color:"#94a3b8",marginTop:1}}>강사 {[...new Set(instrData.map(d=>d.name))].length}명 · {instrData.length}건 · {allMonths[0]||""} ~ {allMonths[allMonths.length-1]||""}</p></div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <nav style={{display:"flex",gap:2,background:"#f1f5f9",padding:3,borderRadius:10}}>
              {NAV.map(n=><button key={n.key} onClick={()=>{setPage(n.key);setDrillName(null);}} style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:page===n.key?"#fff":"transparent",color:page===n.key?"#4f46e5":"#64748b",boxShadow:page===n.key?"0 1px 3px rgba(0,0,0,0.06)":"none",transition:"all .15s"}}>{n.icon} {n.label}</button>)}
            </nav>
            <button onClick={()=>setShowUpload(!showUpload)} className="btn" style={{background:showUpload?"#eef2ff":"#fff",color:"#4f46e5",border:"1px solid #c7d2fe",fontSize:12,padding:"6px 12px"}}>📤 업로드</button>
          </div>
        </div>
      </header>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"16px 24px 60px"}}>

        {/* ═══ Upload Panel ═══ */}
        {showUpload&&<UploadPanel onUpload={handleUpload} uploadLog={uploadLog}/>}

        {/* ═══ Period Filter Bar ═══ */}
        <div className="card" style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",padding:"12px 20px"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>📅 기간 설정</span>
          <select className="sel" value={monthFrom} onChange={e=>setMonthFrom(e.target.value)} style={{width:130}}>
            <option value="">시작월 (전체)</option>
            {allMonths.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <span style={{color:"#94a3b8"}}>~</span>
          <select className="sel" value={monthTo} onChange={e=>setMonthTo(e.target.value)} style={{width:130}}>
            <option value="">종료월 (전체)</option>
            {allMonths.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          {(monthFrom||monthTo)&&<button onClick={()=>{setMonthFrom("");setMonthTo("");}} className="btn-ghost btn" style={{fontSize:11,padding:"4px 10px"}}>✕ 초기화</button>}
          <span style={{marginLeft:"auto",fontSize:11,color:"#94a3b8"}}>강사 데이터 {filteredInstr.length}건 · 부서 점수 {sortedScores.length}개월</span>
        </div>

        {/* ═══ Score Legend ═══ */}
        <div style={{display:"flex",gap:14,marginBottom:16,alignItems:"center",padding:"8px 16px",borderRadius:10,background:"#fff",border:"1px solid #e2e8f0",fontSize:11}}>
          <span style={{fontWeight:600,color:"#64748b"}}>등급:</span>
          {[["우수 ≤0.7","#16a34a"],["양호 ≤1.0","#3b82f6"],["주의 ≤1.3","#f59e0b"],["경고 >1.3","#ef4444"]].map(([l,c])=>(<span key={l} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{color:"#475569"}}>{l}</span></span>))}
          <span style={{fontSize:10,color:"#94a3b8",marginLeft:"auto"}}>* 낮을수록 우수</span>
        </div>

        {/* ═══ PAGES ═══ */}
        {page==="dashboard"&&!drillName&&<DashboardPage latestRec={latestRec} prevRec={prevRec} sortedScores={sortedScores} getYoY={getYoY} filteredInstr={filteredInstr} onDeptClick={d=>{setSelectedDept(d);setPage("chart");}} onDrillName={setDrillName}/>}
        {page==="chart"&&<ChartPage sortedScores={sortedScores} selectedDept={selectedDept} setSelectedDept={setSelectedDept} filteredInstr={filteredInstr} onDrillName={n=>{setDrillName(n);setPage("dashboard");}}/>}
        {page==="instructor"&&!drillName&&<InstructorPage filteredInstr={filteredInstr} onDrill={setDrillName}/>}
        {page==="analysis"&&<AnalysisPage deptScores={deptScores} sortedScores={sortedScores} filteredInstr={filteredInstr} latestRec={latestRec}/>}
        {drillName&&<InstructorDetail name={drillName} data={filteredInstr} onBack={()=>setDrillName(null)}/>}
      </div>
    </div>
  );
}

/* ═══ UPLOAD PANEL ═══ */
function UploadPanel({onUpload,uploadLog}){
  const [dragging,setDragging]=useState(false);
  const [status,setStatus]=useState(null);
  const fileRef=useRef();
  const processFile=async(file)=>{
    setStatus({type:"loading",msg:`${file.name} 처리 중...`});
    try{
      if(file.name.endsWith(".csv")||file.name.endsWith(".tsv")||file.name.endsWith(".txt")){
        const text=await file.text();const recs=parseUploadedText(text);
        if(recs.length){onUpload(recs,file.name);setStatus({type:"success",msg:`${file.name}: ${recs.length}건 로드 완료`});}
        else setStatus({type:"warn",msg:"파싱 가능한 데이터가 없습니다."});
      }else if(file.name.endsWith(".xlsx")||file.name.endsWith(".xls")){
        const ab=await file.arrayBuffer();const wb=XLSX.read(ab,{type:"array"});let all=[];
        for(const sn of wb.SheetNames){const csv=XLSX.utils.sheet_to_csv(wb.Sheets[sn],{FS:"\t"});all=all.concat(parseUploadedText(csv));}
        if(all.length){onUpload(all,file.name);setStatus({type:"success",msg:`${file.name}: ${all.length}건 로드 완료`});}
        else setStatus({type:"warn",msg:"엑셀 파일에서 데이터를 찾지 못했습니다."});
      }else setStatus({type:"warn",msg:"지원 형식: .xlsx, .xls, .csv, .tsv, .txt"});
    }catch(e){setStatus({type:"error",msg:`오류: ${e.message}`});}
  };
  return(
    <div className="card fade-in" style={{marginBottom:16}}>
      <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>📤 월별 데이터 업로드</h3>
      <div className={`drop-zone ${dragging?"over":""}`} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);}} onClick={()=>fileRef.current?.click()}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.tsv,.txt" style={{display:"none"}} onChange={e=>{if(e.target.files[0])processFile(e.target.files[0]);}}/>
        <div style={{fontSize:28,marginBottom:6}}>📂</div>
        <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:4}}>월별 데이터 파일을 드래그하거나 클릭</div>
        <div style={{fontSize:11,color:"#94a3b8"}}>엑셀(.xlsx), CSV, TSV, 텍스트 파일 지원</div>
      </div>
      {status&&<div style={{marginTop:10,padding:"8px 14px",borderRadius:10,fontSize:12,background:status.type==="success"?"#f0fdf4":status.type==="error"?"#fef2f2":"#fffbeb",color:status.type==="success"?"#16a34a":status.type==="error"?"#ef4444":"#d97706",border:"1px solid "+(status.type==="success"?"#bbf7d0":status.type==="error"?"#fecaca":"#fde68a")}}>{status.type==="loading"?"⏳":status.type==="success"?"✅":"⚠️"} {status.msg}</div>}
      {uploadLog.length>0&&<div style={{marginTop:12}}><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>업로드 이력</div>{uploadLog.slice(-5).reverse().map((l,i)=><div key={i} style={{fontSize:11,color:"#64748b",padding:"2px 0"}}>{l.time} · {l.file} · {l.count}건</div>)}</div>}
    </div>
  );
}

/* ═══ CHART PAGE ═══ */
function ChartPage({sortedScores,selectedDept,setSelectedDept,filteredInstr,onDrillName}){
  const [active,setActive]=useState([...DEPT_ORDER,"총괄"]);
  const data=sortedScores;const W=900,H=300,P={t:20,r:30,b:36,l:46};
  const iw=W-P.l-P.r,ih=H-P.t-P.b;
  const allV=data.flatMap(r=>active.map(d=>r[d]).filter(v=>v!=null));
  const mn=Math.min(...allV,0),mx=Math.max(...allV,2),rng=mx-mn||1;
  const xp=i=>P.l+(i/(data.length-1||1))*iw;
  const yp=v=>P.t+ih-(v-mn)/rng*ih;
  const toggle=d=>{if(active.includes(d)){if(active.length>1)setActive(active.filter(x=>x!==d));}else setActive([...active,d]);};

  // Instructors for selected dept
  const latestMonth=data.length?data[data.length-1]:null;
  const deptInstrs=useMemo(()=>{
    if(!selectedDept||!latestMonth)return[];
    const mi=MONTHS_ORDER.indexOf(latestMonth.month);
    const fy=mi===0?latestMonth.year-1:latestMonth.year;
    const mm=String(mi===0?12:mi).padStart(2,'0');
    const mk=`${fy}-${mm}`;
    return filteredInstr.filter(d=>d.dept===selectedDept&&d.month===mk).sort((a,b)=>(a.evalScore??99)-(b.evalScore??99));
  },[selectedDept,latestMonth,filteredInstr]);

  return(
    <div className="fade-in">
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontSize:15,fontWeight:700}}>📈 부서별 평가 추이</h2>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{ALL_DEPTS.map(d=><button key={d} onClick={()=>toggle(d)} className={`pill ${active.includes(d)?"active":""}`} style={active.includes(d)?{borderColor:DEPT_COLORS[d],background:DEPT_COLORS[d]+"12",color:DEPT_COLORS[d]}:{}}><span style={{width:7,height:7,borderRadius:"50%",background:active.includes(d)?DEPT_COLORS[d]:"#d1d5db",display:"inline-block",marginRight:4}}/>{d}</button>)}</div>
        </div>
        <div style={{overflowX:"auto"}}><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W}}>
          {[0,1,2,3,4].map(i=>{const v=mn+(rng*i/4);return<g key={i}><line x1={P.l} y1={yp(v)} x2={W-P.r} y2={yp(v)} stroke="#f1f5f9" strokeWidth={1}/><text x={P.l-6} y={yp(v)+4} textAnchor="end" fontSize={9} fill="#94a3b8">{v.toFixed(1)}</text></g>;})}
          {data.map((r,i)=><text key={i} x={xp(i)} y={H-6} textAnchor="middle" fontSize={8} fill="#94a3b8">{getTimeLabel(r.year,r.month)}</text>)}
          <line x1={P.l} y1={yp(1.0)} x2={W-P.r} y2={yp(1.0)} stroke="#ef4444" strokeWidth={0.7} strokeDasharray="4,4" opacity={0.35}/>
          {active.map(dept=>{const pts=data.map((r,i)=>r[dept]!=null?{x:xp(i),y:yp(r[dept])}:null);const segs=[];let sg=[];pts.forEach(p=>{if(p)sg.push(p);else{if(sg.length>1)segs.push([...sg]);sg=[];}});if(sg.length>1)segs.push(sg);
          return<g key={dept}>{segs.map((s,si)=><polyline key={si} points={s.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke={DEPT_COLORS[dept]} strokeWidth={dept==="총괄"?2.5:1.8} strokeDasharray={dept==="총괄"?"6,4":""} strokeLinecap="round" strokeLinejoin="round" opacity={0.85}/>)}{pts.filter(Boolean).map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={2.5} fill={DEPT_COLORS[dept]} stroke="#fff" strokeWidth={1.5}/>)}</g>;})}
        </svg></div>
      </div>

      {/* Dept selector + drilldown */}
      <div className="card">
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          <span style={{fontSize:13,fontWeight:700,alignSelf:"center"}}>부서 선택 → 강사 드릴다운:</span>
          {DEPT_ORDER.map(d=><button key={d} onClick={()=>setSelectedDept(selectedDept===d?null:d)} className={`pill ${selectedDept===d?"active":""}`} style={selectedDept===d?{borderColor:DEPT_COLORS[d],background:DEPT_COLORS[d]+"12",color:DEPT_COLORS[d]}:{}}>{d}</button>)}
        </div>
        {selectedDept&&(deptInstrs.length>0?
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
            {deptInstrs.map((d,i)=>{const b=scoreBadge(d.evalScore);return(
              <div key={i} onClick={()=>onDrillName(d.name)} style={{padding:"10px 14px",borderRadius:10,border:"1px solid #e2e8f0",cursor:"pointer",transition:"all .15s",background:i<3?"#f0fdf4":"#fff"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:12}}>{i+1}. {d.name}</span><span style={{padding:"1px 7px",borderRadius:5,fontSize:11,fontWeight:700,background:b.bg,color:b.color}}>{fmtScore(d.evalScore)}</span></div>
                <div style={{display:"flex",gap:8,marginTop:4,fontSize:10,color:"#64748b"}}><span>퇴원 {fmtPct(d.dropRate)}</span><span>급/매 {fmtPct(d.salaryRevenueRatio)}</span></div>
              </div>);})}
          </div>
        :<div style={{padding:24,textAlign:"center",color:"#94a3b8",fontSize:13}}>해당 기간에 {selectedDept} 강사 데이터가 없습니다.</div>)}
      </div>
    </div>
  );
}

/* ═══ INSTRUCTOR PAGE ═══ */
function InstructorPage({filteredInstr,onDrill}){

  const [search,setSearch]=useState("");
  const [sortK,setSortK]=useState("evalScore");
  const names=useMemo(()=>{const m={};filteredInstr.forEach(d=>{if(!m[d.name]||d.month>m[d.name].month)m[d.name]=d;});let a=Object.values(m);if(fDept!=="전체")a=a.filter(d=>d.dept===fDept);if(search)a=a.filter(d=>d.name.includes(search));a.sort((a,b)=>(a[sortK]??99)-(b[sortK]??99));return a;},[filteredInstr,fDept,search,sortK]);

  return(
    <div className="fade-in">
      <div className="card">
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>
          <h2 style={{fontSize:15,fontWeight:700}}>👤 강사별 평가</h2>
          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="강사명 검색..." style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,outline:"none",width:150}}/>
            <select className="sel" value={fDept} onChange={e=>setFDept(e.target.value)} style={{fontSize:12}}><option value="전체">전체 부서</option>{[...DEPT_ORDER,"과학과","광명관"].map(d=><option key={d}>{d}</option>)}</select>
          </div>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:12}}>{[["evalScore","평가점수순"],["salaryRevenueRatio","급여/매출순"],["dropRate","퇴원율순"]].map(([k,l])=><button key={k} onClick={()=>setSortK(k)} className={`pill ${sortK===k?"active":""}`}>{l}</button>)}</div>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f8fafc"}}>{["#","강사명","부서","평가","급여/매출","퇴원율","근태","기준월"].map(h=><th key={h} style={{padding:"8px 10px",fontWeight:600,color:"#64748b",fontSize:11,textAlign:h==="#"||h==="강사명"||h==="부서"?"left":"center"}}>{h}</th>)}</tr></thead>
          <tbody>{names.slice(0,60).map((d,i)=>{const b=scoreBadge(d.evalScore);return(
            <tr key={d.name+d.month} onClick={()=>onDrill(d.name)} style={{borderBottom:"1px solid #f1f5f9",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <td style={{padding:"7px 10px",color:"#94a3b8",fontSize:11}}>{i+1}</td>
              <td style={{padding:"7px 10px",fontWeight:700}}>{d.name}</td>
              <td style={{padding:"7px 10px"}}><span style={{padding:"1px 7px",borderRadius:5,fontSize:10,fontWeight:600,background:(DEPT_COLORS[d.dept]||"#6366f1")+"15",color:DEPT_COLORS[d.dept]||"#6366f1"}}>{d.dept}</span></td>
              <td style={{padding:"7px 10px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:6,fontWeight:700,fontSize:11,background:b.bg,color:b.color}}>{fmtScore(d.evalScore)}</span></td>
              <td style={{padding:"7px 10px",textAlign:"center",color:d.salaryRevenueRatio>80?"#ef4444":"#475569"}}>{fmtPct(d.salaryRevenueRatio)}</td>
              <td style={{padding:"7px 10px",textAlign:"center",color:d.dropRate>10?"#ef4444":"#475569"}}>{fmtPct(d.dropRate)}</td>
              <td style={{padding:"7px 10px",textAlign:"center"}}>{d.attendance??"-"}</td>
              <td style={{padding:"7px 10px",textAlign:"center",color:"#94a3b8",fontSize:11}}>{d.month}</td>
            </tr>);})}</tbody>
        </table>{names.length>60&&<div style={{padding:10,textAlign:"center",color:"#94a3b8",fontSize:11}}>상위 60명 표시 (전체 {names.length}명)</div>}</div>
      </div>
    </div>
  );
}

/* ═══ INSTRUCTOR DETAIL ═══ */
function InstructorDetail({name,data,onBack}){
  const recs=useMemo(()=>data.filter(d=>d.name===name).sort((a,b)=>a.month.localeCompare(b.month)),[name,data]);
  const latest=recs[recs.length-1];const lb=scoreBadge(latest?.evalScore);
  return(
    <div className="fade-in">
      <button onClick={onBack} className="btn btn-ghost" style={{marginBottom:12}}>← 목록으로</button>
      <div className="card">
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
          <div style={{width:44,height:44,borderRadius:11,background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800}}>{name[0]}</div>
          <div><h2 style={{fontSize:18,fontWeight:800}}>{name}</h2>{latest&&<p style={{fontSize:12,color:"#64748b"}}>{latest.dept} · {recs.length}개월 데이터</p>}</div>
          {latest&&<div style={{marginLeft:"auto",padding:"5px 14px",borderRadius:10,background:lb.bg,color:lb.color,fontWeight:700,fontSize:13}}>{lb.text}</div>}
        </div>
        {latest&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:18}}>
          {[{l:"급여/매출",v:fmtPct(latest.salaryRevenueRatio),w:latest.salaryRevenueRatio>80},{l:"퇴원율",v:fmtPct(latest.dropRate),w:latest.dropRate>10},{l:"근태",v:latest.attendance??"-"},{l:"부서장평가",v:latest.managerEval??"-"}].map(s=>(
            <div key={s.l} style={{padding:"10px 12px",borderRadius:10,background:"#f8fafc",border:"1px solid #e2e8f0"}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:3}}>{s.l}</div><div style={{fontSize:15,fontWeight:700,color:s.w?"#ef4444":"#1e293b"}}>{s.v}</div></div>
          ))}
        </div>}
        <h3 style={{fontSize:13,fontWeight:700,marginBottom:8}}>📅 월별 추이</h3>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f8fafc"}}>{["기간","월초","월말","퇴원","퇴원율","급/매","근태","부서장","평가"].map(h=><th key={h} style={{padding:"7px 8px",fontWeight:600,color:"#64748b",textAlign:"center",fontSize:11}}>{h}</th>)}</tr></thead>
          <tbody>{recs.map((d,i)=>{const prev=i>0?recs[i-1]:null;const diff=prev&&d.evalScore!=null&&prev.evalScore!=null?d.evalScore-prev.evalScore:null;const b=scoreBadge(d.evalScore);
          return<tr key={d.month} style={{borderBottom:"1px solid #f1f5f9"}}>
            <td style={{padding:"6px 8px",fontWeight:600,textAlign:"center"}}>{d.month}</td>
            <td style={{padding:"6px 8px",textAlign:"center"}}>{d.startCount}</td><td style={{padding:"6px 8px",textAlign:"center"}}>{d.endCount}</td>
            <td style={{padding:"6px 8px",textAlign:"center"}}>{d.dropCount}</td>
            <td style={{padding:"6px 8px",textAlign:"center",color:d.dropRate>10?"#ef4444":"#475569"}}>{fmtPct(d.dropRate)}</td>
            <td style={{padding:"6px 8px",textAlign:"center",color:d.salaryRevenueRatio>80?"#ef4444":"#475569"}}>{fmtPct(d.salaryRevenueRatio)}</td>
            <td style={{padding:"6px 8px",textAlign:"center"}}>{d.attendance??"-"}</td><td style={{padding:"6px 8px",textAlign:"center"}}>{d.managerEval??"-"}</td>
            <td style={{padding:"6px 8px",textAlign:"center"}}><span style={{display:"inline-flex",alignItems:"center",gap:3}}><span style={{padding:"1px 7px",borderRadius:5,fontWeight:700,background:b.bg,color:b.color,fontSize:11}}>{fmtScore(d.evalScore)}</span>{diff!=null&&Math.abs(diff)>0.01&&<span style={{fontSize:9,fontWeight:600,color:diff>0?"#ef4444":"#16a34a"}}>{diff>0?"▲":"▼"}{Math.abs(diff).toFixed(2)}</span>}</span></td>
          </tr>;})}</tbody>
        </table></div>
      </div>
    </div>
  );
}

/* ═══ ANALYSIS PAGE ═══ */
function AnalysisPage({deptScores,sortedScores,filteredInstr,latestRec}){
  if(!latestRec)return<div style={{padding:40,textAlign:"center",color:"#94a3b8"}}>데이터가 없습니다.</div>;
  const deptRank=DEPT_ORDER.map(d=>({dept:d,score:latestRec[d]})).filter(d=>d.score!=null).sort((a,b)=>a.score-b.score);
  const yoyData=DEPT_ORDER.map(d=>{const ly=deptScores.find(r=>r.year===latestRec.year-1&&r.month===latestRec.month);const c=latestRec[d];const p=ly?ly[d]:null;return{dept:d,current:c,prev:p,diff:c!=null&&p!=null?c-p:null};}).filter(d=>d.diff!=null);
  const allM=[...new Set(filteredInstr.map(d=>d.month))].sort();const lm=allM[allM.length-1];
  const li=filteredInstr.filter(d=>d.month===lm&&d.evalScore!=null);
  const top5=[...li].sort((a,b)=>a.evalScore-b.evalScore).slice(0,5);
  const bot5=[...li].sort((a,b)=>b.evalScore-a.evalScore).slice(0,5);

  return(
    <div className="fade-in">
      <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:12,padding:14,marginBottom:16,fontSize:12,color:"#3730a3",lineHeight:1.7}}>
        <strong>📐 평가 공식</strong> — 점수 = 급여÷매출 + 퇴원율×10 + (5−근태)÷15 + (5−부서장평가)÷10 <span style={{color:"#6366f1"}}>* 낮을수록 우수</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
        <div className="card"><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🏆 부서 순위 ({latestRec.year}년 {latestRec.month})</h3>
        {deptRank.map((d,i)=>{const b=scoreBadge(d.score);const mx=Math.max(...deptRank.map(x=>x.score),1);return(
          <div key={d.dept} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{width:22,fontSize:13,fontWeight:800,color:i===0?"#16a34a":i===deptRank.length-1?"#ef4444":"#64748b"}}>{i+1}</span>
            <span style={{width:7,height:7,borderRadius:"50%",background:DEPT_COLORS[d.dept]}}/><span style={{width:55,fontWeight:600,fontSize:12}}>{d.dept}</span>
            <div style={{flex:1,height:20,background:"#f1f5f9",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(d.score/mx*100,8)}%`,background:b.color+"40",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}}><span style={{fontSize:10,fontWeight:700,color:b.color}}>{d.score.toFixed(2)}</span></div></div>
          </div>);})}</div>

        <div className="card"><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>📊 전년 동월 대비 ({latestRec.month})</h3>
        {yoyData.length>0?yoyData.map(d=>(
          <div key={d.dept} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"7px 10px",borderRadius:8,background:d.diff>0.05?"#fef2f2":d.diff<-0.05?"#f0fdf4":"#f8fafc"}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:DEPT_COLORS[d.dept]}}/><span style={{width:55,fontWeight:600,fontSize:12}}>{d.dept}</span>
            <span style={{fontSize:11,color:"#94a3b8"}}>{d.prev?.toFixed(2)}→</span><span style={{fontSize:13,fontWeight:700,color:scoreColor(d.current)}}>{d.current?.toFixed(2)}</span>
            <span style={{marginLeft:"auto",fontWeight:700,fontSize:12,color:d.diff>0.05?"#ef4444":d.diff<-0.05?"#16a34a":"#94a3b8"}}>{d.diff>0?"▲":"▼"}{Math.abs(d.diff).toFixed(2)} {d.diff>0.05?"악화":d.diff<-0.05?"개선":"유지"}</span>
          </div>
        )):<div style={{color:"#94a3b8",fontSize:12,padding:16,textAlign:"center"}}>전년 동월 데이터 없음</div>}</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div className="card"><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🏆 우수 강사 TOP 5 ({lm})</h3>
        {top5.map((d,i)=>{const b=scoreBadge(d.evalScore);return<div key={d.name} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<4?"1px solid #f1f5f9":"none"}}>
          <span style={{width:18,fontSize:12,fontWeight:800,color:"#16a34a"}}>{i+1}</span><span style={{flex:1,fontWeight:600,fontSize:12}}>{d.name}</span>
          <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:(DEPT_COLORS[d.dept]||"#6366f1")+"15",color:DEPT_COLORS[d.dept]||"#6366f1",fontWeight:600}}>{d.dept}</span>
          <span style={{padding:"1px 8px",borderRadius:6,fontWeight:700,fontSize:11,background:b.bg,color:b.color}}>{fmtScore(d.evalScore)}</span>
        </div>;})}</div>

        <div className="card" style={{borderColor:"#fecaca"}}><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>⚠️ 개선 필요 TOP 5 ({lm})</h3>
        {bot5.map((d,i)=>{const b=scoreBadge(d.evalScore);return<div key={d.name} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<4?"1px solid #f1f5f9":"none"}}>
          <span style={{width:18,fontSize:12,fontWeight:800,color:"#ef4444"}}>{i+1}</span><span style={{flex:1,fontWeight:600,fontSize:12}}>{d.name}</span>
          <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:(DEPT_COLORS[d.dept]||"#6366f1")+"15",color:DEPT_COLORS[d.dept]||"#6366f1",fontWeight:600}}>{d.dept}</span>
          <span style={{padding:"1px 8px",borderRadius:6,fontWeight:700,fontSize:11,background:b.bg,color:b.color}}>{fmtScore(d.evalScore)}</span>
        </div>;})}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
