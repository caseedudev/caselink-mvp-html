## I. 시스템 개요 및 핵심 알고리즘 목록
CaseLink는 사교육 환경에서 강사·학생·학부모 간의 학습 데이터를 통합 관리하는 학원 운영 플랫폼입니다. 단순한 **"기록 도구"**가 아닌 **"개입(Intervention) 도구"**를 핵심 철학으로 하며, 학원의 표준 운영 매뉴얼을 디지털 알고리즘화하여 강사가 판단 없이도 매뉴얼대로 행동할 수 있도록 지원합니다.

## II. 알고리즘 1 — 재원생 학교별 내신 평균 자동 산출

### 1-1. 기술적 배경
기존 시스템은 개인 성적만 기록할 뿐, 학교 공식 평균이 공개되기 전까지는 실시간 비교가 불가능했습니다. CaseLink는 보유한 재원생 데이터를 활용해 실시간 비교 지표를 산출합니다.

### 1-2. 알고리즘 구조
* **함수명:** \`calcSchoolAvg(school, exam)\`
* **입력:** 학교명(string), 시험명(string)
* **로직:** 전체 재원생 데이터 중 조건에 부합하는 점수들의 산술 평균(반올림) 반환.
* **시간복잡도:** $O(N \\cdot M)$ ($N$: 전체 학생 수, $M$: 학생당 시험 기록 수)

### 1-3. 처리 흐름

\`\`\`mermaid
flowchart LR
    A[학교명 + 시험명 입력] --> B[전체 재원생 필터링]
    B --> C[해당 학교 학생 추출]
    C --> D[시험 점수 수집]
    D --> E[산술 평균 계산]
    E --> F[반올림 후 반환]
    style A fill:#EBF3FF,stroke:#1E6FD9
    style F fill:#E3F6EF,stroke:#0A9268
\`\`\`

### 1-4. 특허 핵심 클레임
* 외부 데이터 없이 학원 자체 데이터만으로 실시간 학교별 평균을 산출하는 방법.
* 성적 입력 시 동일 학교 재원생 평균이 자동 갱신되어 관련 학생 지표에 즉시 반영되는 구조.

---

## III. 알고리즘 2 — 학부모 성향 자동 분류 및 상담 전략 도출

### 2-1. 하이브리드 처리 구조

\`\`\`mermaid
flowchart TB
    A[상담 이력 텍스트] --> B{LLM API 호출}
    B -->|성공| C[구조화 JSON 획득]
    B -->|실패| D[규칙 기반 폴백 엔진]
    D --> E[키워드 분석]
    E --> C
    C --> F[성향 태그 + 맞춤 전략]
    style B fill:#FEF3C7,stroke:#C97008
    style C fill:#E3F6EF,stroke:#0A9268
    style D fill:#FEE2E2,stroke:#C8220E
\`\`\`

### 2-2. 규칙 기반 분류 로직
| 분류 조건 | 도출 성향 태그 | 맞춤 전략 |
| :--- | :--- | :--- |
| "퇴원" 포함 | 퇴원 위험 | 공감 우선 → 조건부 유지 제안 |
| "과제" 포함 | 과제 민감 | 과제 부담 경감 옵션 선제 제시 |
| "점수/성적" 포함 | 성과 중시 | 정기 성취 데이터 공유 강화 |
| 상담 3건 이상 | 적극 소통형 | 신속 회신 및 상세 보고 제공 |

### 2-3. 특허 핵심 클레임
* 자연어 상담 텍스트를 분석하여 학부모를 성향 카테고리로 자동 분류하는 방법.
* LLM과 규칙 기반 엔진의 하이브리드 구성을 통한 서비스 연속성 보장.

## IV. 알고리즘 3 — 내신대비 단계 프로세스 마스터 구조

### 3-1. 데이터 구조
* \`nsMasterProcesses[]\`: 시험별 프로세스 메타데이터 (시험명, 반, 단계별 과제 등)
* \`nsMasterChecks{procKey}{studentId}\`: 학생별 수행 데이터 (완료 여부, 점수 등)

### 3-2. 특허 핵심 클레임
* 반 단위 1회 설정으로 전체 학생에게 자동 배정되는 메커니즘.
* 메타데이터와 수행 데이터를 분리 저장하여 데이터 효율성 및 이력 누적 기능을 강화한 구조.

---

## V. 알고리즘 4 — 현재 날짜 기반 내신 시험 자동 예측

### 4-1. 날짜 분류 및 추천 규칙

## VI. 알고리즘 5 — 모의고사 점수 추이 분석 및 색상 코딩

### 5-1. 추세 판정 및 구간 색상
* **상승:** 마지막-첫 점수 $\\ge$ +5점 (**Teal**)
* **안정:** -5점 < 변화 < +5점 (**Blue**)
* **하락:** 마지막-첫 점수 $\\le$ -5점 (**Red**)

| 점수 범위 | 색상 | 의미 |
| :--- | :--- | :--- |
| 85점 이상 | Teal | 우수 (목표 달성) |
| 70~84점 | Blue | 양호 (안정권) |
| 55~69점 | Amber | 주의 (보완 필요) |
| 54점 이하 | Red | 위험 (집중 지도) |

// ── RENDER ──
(function(){
  // Configure marked
  var renderer = new marked.Renderer();

  // Custom code block renderer for mermaid
  renderer.code = function(obj) {
    var text = obj.text || obj;
    var lang = obj.lang || '';
    if(lang === 'mermaid'){
      return '<div class="mermaid">' + text + '</div>';
    }
    return '<pre><code>' + (typeof text === 'string' ? text.replace(/</g,'&lt;').replace(/>/g,'&gt;') : text) + '</code></pre>';
  };

  marked.setOptions({
    renderer: renderer,
    gfm: true,
    breaks: false
  });

  // Render markdown
  var html = marked.parse(MD_SOURCE);

  // Process inline KaTeX ($...$)
  html = html.replace(/\$([^$]+)\$/g, function(m, tex){
    try { return katex.renderToString(tex, {throwOnError:false}); }
    catch(e){ return m; }
  });

  document.getElementById('md-content').innerHTML = html;

  // Initialize mermaid
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    themeVariables: {
      primaryColor: '#EBF3FF',
      primaryBorderColor: '#1E6FD9',
      primaryTextColor: '#0B1E3D',
      lineColor: '#B8BFCC',
      secondaryColor: '#E3F6EF',
      tertiaryColor: '#FEF3C7',
      fontSize: '13px',
      fontFamily: 'Noto Sans KR, sans-serif'
    }
  });

  // Build TOC from h2 elements
  buildTOC();

  // Scroll to top button
  window.addEventListener('scroll', function(){
    var btn = document.getElementById('scrollTop');
    btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
  });
})();

function buildTOC(){
  var headings = document.querySelectorAll('.md-body h2');
  var tocHtml = '<div class="toc-title">목차</div><ul class="toc-list">';
  headings.forEach(function(h, i){
    var id = 'section-' + i;
    h.id = id;
    var text = h.textContent.replace(/^\[|\]$/g,'').trim();
    if(text.length > 30) text = text.substring(0,30) + '…';
    tocHtml += '<li><a href="#' + id + '" data-target="' + id + '">' + text + '</a></li>';
  });
  tocHtml += '</ul>';
  document.getElementById('toc').innerHTML = tocHtml;

  // Highlight active TOC item on click + scroll
  var links = document.querySelectorAll('.toc-list a');

  // Click handler: immediately set active state
  links.forEach(function(link){
    link.addEventListener('click', function(e){
      e.preventDefault();
      var targetId = this.getAttribute('data-target');
      var target = document.getElementById(targetId);
      if(!target) return;
      links.forEach(function(l){ l.classList.remove('active'); });
      this.classList.add('active');
      target.scrollIntoView({behavior:'smooth', block:'start'});
      // Also scroll TOC sidebar to keep active item visible
      var tocSidebar = document.getElementById('toc');
      if(tocSidebar && this.offsetTop > tocSidebar.clientHeight){
        tocSidebar.scrollTop = this.offsetTop - tocSidebar.clientHeight / 2;
      }
    });
  });

  // Scroll observer: update active state while scrolling
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        links.forEach(function(l){ l.classList.remove('active'); });
        var active = document.querySelector('.toc-list a[data-target="'+entry.target.id+'"]');
        if(active) active.classList.add('active');
      }
    });
  }, {rootMargin:'0px 0px -60% 0px', threshold:0.1});
  headings.forEach(function(h){ observer.observe(h); });
}
</script>
