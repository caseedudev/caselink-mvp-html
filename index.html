<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CaseLink MVP - HTML Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1E3D;--navy2:#142952;--navy3:#1C3A6E;--navy4:#1a3563;
  --blue:#1E6FD9;--blue-l:#3B82F6;--blue-bg:rgba(30,111,217,.12);
  --g50:#F7F8FA;--g100:#EEF0F4;--g200:#D6DAE3;--g300:#B8BFCC;
  --g400:#9AA3B4;--g500:#737D90;--g600:#565E6D;--g800:#252B36;
  --white:#FFFFFF;
  --sidebar-w:280px;
  --topbar-h:56px;
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;color:var(--g800);
}

body{display:flex;min-height:100vh;background:var(--g50);overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);min-height:100vh;
  background:var(--navy);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;
  transition:transform .25s ease;
}
.sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;cursor:pointer;
}
.sidebar-logo .logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--blue);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:var(--white);
  flex-shrink:0;
}
.sidebar-logo .logo-text{
  font-size:16px;font-weight:700;color:var(--white);
  letter-spacing:-.3px;
}
.sidebar-logo .logo-sub{
  font-size:11px;font-weight:400;color:var(--g400);
  margin-top:1px;
}

/* Navigation */
.sidebar-nav{
  flex:1;overflow-y:auto;padding:12px 0;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.15) transparent;
}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.phase-group{margin-bottom:4px}
.phase-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;
  font-size:11px;font-weight:600;
  color:var(--g400);
  text-transform:uppercase;letter-spacing:.5px;
  cursor:pointer;
  user-select:none;
  transition:color .15s ease;
}
.phase-header:hover{color:var(--g300)}
.phase-header svg{
  width:14px;height:14px;
  transition:transform .2s ease;
  flex-shrink:0;
}
.phase-header.collapsed svg{transform:rotate(-90deg)}
.phase-badge{
  font-size:10px;font-weight:500;
  background:rgba(255,255,255,.08);
  color:var(--g400);
  padding:1px 6px;border-radius:10px;
  margin-left:auto;
}

.phase-items{overflow:hidden;transition:max-height .25s ease}
.phase-items.collapsed{max-height:0 !important}

.date-label{
  padding:6px 20px 4px 44px;
  font-size:10px;font-weight:500;
  color:var(--g500);letter-spacing:.3px;
}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px 8px 44px;
  color:rgba(255,255,255,.7);
  font-size:13px;font-weight:400;
  text-decoration:none;
  cursor:pointer;
  transition:all .15s ease;
  border-left:3px solid transparent;
  position:relative;
}
.nav-item:hover{
  background:rgba(255,255,255,.05);
  color:var(--white);
}
.nav-item.active{
  background:var(--blue-bg);
  color:var(--white);
  font-weight:500;
  border-left-color:var(--blue);
}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.nav-item.active svg{opacity:1;color:var(--blue-l)}
.nav-item-text{
  flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}

/* Sidebar footer */
.sidebar-footer{
  padding:12px 20px;
  border-top:1px solid rgba(255,255,255,.08);
  font-size:11px;color:var(--g500);
  text-align:center;
}

/* ── SIDEBAR COLLAPSE ── */
.sidebar.hidden{transform:translateX(-100%)}
.btn-collapse{
  width:100%;padding:10px 20px;
  border:none;background:rgba(255,255,255,.04);
  color:var(--g400);font-size:12px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .15s ease;font-family:inherit;
  border-top:1px solid rgba(255,255,255,.08);
}
.btn-collapse:hover{background:rgba(255,255,255,.08);color:var(--g300)}
.btn-collapse svg{width:16px;height:16px;transition:transform .2s ease}

/* ── MAIN AREA ── */
.main{
  margin-left:var(--sidebar-w);
  flex:1;display:flex;flex-direction:column;
  min-height:100vh;
  transition:margin-left .25s ease;
}
.main.expanded{margin-left:0}

/* Topbar */
.topbar{
  height:var(--topbar-h);
  background:var(--white);
  border-bottom:1px solid var(--g200);
  display:flex;align-items:center;
  padding:0 24px;gap:12px;
  flex-shrink:0;
}
.btn-menu{
  width:36px;height:36px;
  border:none;background:none;
  cursor:pointer;color:var(--g600);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.btn-menu:hover{background:var(--g100)}
.btn-menu svg{width:20px;height:20px}

.breadcrumb{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--g500);
}
.breadcrumb span{color:var(--g800);font-weight:500}

.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-newtab{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:6px;
  border:1px solid var(--g200);background:var(--white);
  font-size:12px;font-weight:500;color:var(--g600);
  cursor:pointer;transition:all .15s ease;
  font-family:inherit;
}
.btn-newtab:hover{border-color:var(--blue);color:var(--blue);background:rgba(30,111,217,.04)}
.btn-newtab svg{width:14px;height:14px}

/* Content area */
.content{flex:1;position:relative}
.content iframe{
  width:100%;height:100%;border:none;
  position:absolute;top:0;left:0;right:0;bottom:0;
}

/* Welcome screen */
.welcome{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;padding:40px;
  text-align:center;
}
.welcome-icon{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,var(--blue),#6366f1);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;
  box-shadow:0 8px 32px rgba(30,111,217,.2);
}
.welcome-icon svg{width:36px;height:36px;color:var(--white)}
.welcome h1{
  font-size:24px;font-weight:700;color:var(--g800);
  margin-bottom:8px;letter-spacing:-.3px;
}
.welcome p{
  font-size:14px;color:var(--g500);
  line-height:1.6;max-width:400px;
}
.welcome-stats{
  display:flex;gap:32px;margin-top:32px;
}
.welcome-stat{text-align:center}
.welcome-stat .num{
  font-size:28px;font-weight:700;color:var(--blue);
}
.welcome-stat .label{
  font-size:12px;color:var(--g500);margin-top:2px;
}

/* Overlay for mobile */
.sidebar-overlay{
  display:none;position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);z-index:99;
}

/* ── SETTINGS BUTTON ── */
.btn-settings{
  width:100%;padding:10px 20px;
  border:none;background:rgba(30,111,217,.1);
  color:var(--blue-l);font-size:12px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .15s ease;font-family:inherit;
}
.btn-settings:hover{background:rgba(30,111,217,.2);color:var(--white)}
.btn-settings svg{width:16px;height:16px}

/* ── SETTINGS MODAL ── */
.settings-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);z-index:200;
  align-items:center;justify-content:center;
}
.settings-overlay.open{display:flex}
.settings-modal{
  background:var(--white);border-radius:16px;
  width:520px;max-width:95vw;max-height:85vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.settings-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--g100);
  display:flex;align-items:center;justify-content:space-between;
}
.settings-header h2{font-size:17px;font-weight:700;color:var(--g800);margin:0}
.settings-close{
  width:32px;height:32px;border:none;background:var(--g50);
  border-radius:8px;cursor:pointer;font-size:18px;color:var(--g500);
  display:flex;align-items:center;justify-content:center;
}
.settings-close:hover{background:var(--g100);color:var(--g800)}
.settings-body{padding:20px 24px}
.provider-section{margin-bottom:20px;border:1px solid var(--g200);border-radius:12px;overflow:hidden}
.provider-header{
  padding:12px 16px;background:var(--g50);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
}
.provider-header:hover{background:var(--g100)}
.provider-name{font-size:14px;font-weight:600;color:var(--g800);display:flex;align-items:center;gap:8px}
.provider-badge{
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;
  background:#dcfce7;color:#16a34a;
}
.provider-badge.inactive{background:var(--g100);color:var(--g400)}
.provider-body{padding:14px 16px;display:none;border-top:1px solid var(--g200)}
.provider-body.open{display:block}
.setting-label{font-size:12px;font-weight:600;color:var(--g600);margin-bottom:5px;display:block}
.setting-input{
  width:100%;padding:9px 12px;border:1.5px solid var(--g200);border-radius:8px;
  font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;
  transition:border-color .15s;
}
.setting-input:focus{border-color:var(--blue)}
.setting-select{
  width:100%;padding:9px 12px;border:1.5px solid var(--g200);border-radius:8px;
  font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;
  background:var(--white);cursor:pointer;
}
.setting-row{margin-bottom:12px}
.setting-row:last-child{margin-bottom:0}
.settings-footer{
  padding:16px 24px;border-top:1px solid var(--g100);
  display:flex;gap:8px;justify-content:flex-end;
}
.btn-save{
  padding:9px 20px;border:none;border-radius:8px;
  background:var(--blue);color:var(--white);
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:opacity .15s;
}
.btn-save:hover{opacity:.9}
.btn-cancel{
  padding:9px 20px;border:1px solid var(--g200);border-radius:8px;
  background:var(--white);color:var(--g600);
  font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;
}
.btn-cancel:hover{background:var(--g50)}
.save-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#16a34a;color:#fff;padding:10px 24px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:300;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.save-toast.show{opacity:1}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .main.expanded{margin-left:0}
}
</style>
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" onclick="showWelcome()">
      <div class="logo-icon">CL</div>
      <div>
        <div class="logo-text">CaseLink</div>
        <div class="logo-sub">MVP HTML Showcase</div>
      </div>
    </a>
  </div>
  <nav class="sidebar-nav" id="sidebarNav">
    <!-- JS generates navigation here -->
  </nav>
  <div class="sidebar-footer" id="sidebarFooter"></div>
  <button class="btn-settings" onclick="openSettings()" aria-label="LLM Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    LLM API 설정
  </button>
  <button class="btn-collapse" onclick="collapseSidebar()" aria-label="Hide sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    사이드바 숨기기
  </button>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <button class="btn-menu" onclick="toggleSidebar()" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="breadcrumb" id="breadcrumb">
      <span>Home</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-newtab" id="btnNewTab" onclick="openInNewTab()" style="display:none" aria-label="Open in new tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        New Tab
      </button>
    </div>
  </header>
  <div class="content" id="content">
    <!-- Welcome or iframe goes here -->
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-modal">
    <div class="settings-header">
      <h2>LLM API 설정</h2>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body" id="settingsBody">
      <!-- JS generates provider sections here -->
    </div>
    <div class="settings-footer">
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
      <button class="btn-save" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>
<div class="save-toast" id="saveToast">설정이 저장되었습니다</div>

<script>
// ============================================================
// PAGE REGISTRY - Add new pages here
// Format: { phase: number, date: "YYMMDD", title: "...", file: "path/to/file.html" }
// ============================================================
const PAGES = [
  // ── Phase 0 ──
  { phase: 0, date: "260331", title: "연간계획 매뉴얼포함", file: "Phase0/260331_연간계획_매뉴얼포함.html" },
  { phase: 0, date: "260331", title: "운영체크리스트", file: "Phase0/260331_운영체크리스트.html" },
  { phase: 0, date: "260331", title: "통합대시보드 v2", file: "Phase0/260331_케이스학원_통합대시보드_v2.html" },
  { phase: 0, date: "260331", title: "퇴원예방서비스", file: "Phase0/260331_퇴원예방서비스.html" },
  { phase: 0, date: "260331", title: "학원운영 학생수 관리", file: "Phase0/260331_학원운영_학생수 관리.html" },
  // ── Phase 1 ──
  { phase: 1, date: "260403", title: "강사용 UI", file: "Phase1/260403_강사용UI.html" },
  // ── Add new pages below ──
];

// ============================================================
// State
// ============================================================
let currentFile = null;
let sidebarVisible = true;
const collapsedPhases = new Set();

// ============================================================
// Build Navigation
// ============================================================
function buildNav() {
  const nav = document.getElementById('sidebarNav');
  const footer = document.getElementById('sidebarFooter');

  // Group by phase
  const phases = {};
  PAGES.forEach(p => {
    if (!phases[p.phase]) phases[p.phase] = [];
    phases[p.phase].push(p);
  });

  // Sort pages within each phase by date
  Object.values(phases).forEach(items => items.sort((a, b) => a.date.localeCompare(b.date)));

  let html = '';
  const phaseKeys = Object.keys(phases).sort((a, b) => a - b);

  phaseKeys.forEach(phase => {
    const items = phases[phase];
    const isCollapsed = collapsedPhases.has(phase);

    html += `<div class="phase-group">`;
    html += `<div class="phase-header ${isCollapsed ? 'collapsed' : ''}" onclick="togglePhase('${phase}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      Phase ${phase}
      <span class="phase-badge">${items.length}</span>
    </div>`;
    html += `<div class="phase-items ${isCollapsed ? 'collapsed' : ''}" id="phase-${phase}">`;

    // Group by date within phase
    let lastDate = '';
    items.forEach(item => {
      if (item.date !== lastDate) {
        const y = '20' + item.date.slice(0, 2);
        const m = item.date.slice(2, 4);
        const d = item.date.slice(4, 6);
        html += `<div class="date-label">${y}.${m}.${d}</div>`;
        lastDate = item.date;
      }
      const isActive = currentFile === item.file;
      html += `<a class="nav-item ${isActive ? 'active' : ''}" onclick="loadPage('${item.file}', 'Phase ${item.phase}', '${item.title}')" title="${item.title}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="nav-item-text">${item.title}</span>
      </a>`;
    });

    html += `</div></div>`;
  });

  nav.innerHTML = html;

  // Set max-height for animation
  phaseKeys.forEach(phase => {
    const el = document.getElementById('phase-' + phase);
    if (el && !collapsedPhases.has(phase)) {
      el.style.maxHeight = el.scrollHeight + 'px';
    }
  });

  // Footer stats
  footer.textContent = `${PAGES.length} pages across ${phaseKeys.length} phase${phaseKeys.length > 1 ? 's' : ''}`;

  // Update welcome stats
  updateWelcomeStats(phaseKeys.length, PAGES.length);
}

// ============================================================
// Phase Toggle
// ============================================================
function togglePhase(phase) {
  if (collapsedPhases.has(phase)) {
    collapsedPhases.delete(phase);
  } else {
    collapsedPhases.add(phase);
  }
  buildNav();
}

// ============================================================
// Load Page in iframe
// ============================================================
function loadPage(file, phaseName, title, skipHash, section) {
  currentFile = file;
  const content = document.getElementById('content');
  const srcSuffix = section ? '?section=' + section : '';
  content.innerHTML = `<iframe src="${file}${srcSuffix}" title="${title}"></iframe>`;

  // Update URL hash
  if (!skipHash) {
    const sectionPart = section ? '&section=' + section : '';
    history.pushState({ file, phaseName, title }, '', '#page=' + encodeURIComponent(file) + sectionPart);
  }

  // Update breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `<a style="color:var(--g500);text-decoration:none;cursor:pointer" onclick="showWelcome()">Home</a>
     <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
     ${phaseName}
     <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
     <span>${title}</span>`;

  document.getElementById('btnNewTab').style.display = 'inline-flex';
  document.title = `${title} - CaseLink MVP`;

  buildNav(); // refresh active state
  closeSidebar(); // close on mobile
}

// ============================================================
// Welcome Screen
// ============================================================
function showWelcome(skipHash) {
  currentFile = null;
  if (!skipHash) history.pushState({}, '', location.pathname);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
        </svg>
      </div>
      <h1>CaseLink MVP Showcase</h1>
      <p>Phase별 MVP HTML 프로토타입을 한눈에 탐색하세요.<br/>왼쪽 사이드바에서 페이지를 선택하면 여기에 표시됩니다.</p>
      <div class="welcome-stats">
        <div class="welcome-stat">
          <div class="num" id="statPhases">-</div>
          <div class="label">Phases</div>
        </div>
        <div class="welcome-stat">
          <div class="num" id="statPages">-</div>
          <div class="label">Pages</div>
        </div>
      </div>
    </div>`;

  document.getElementById('breadcrumb').innerHTML = '<span>Home</span>';
  document.getElementById('btnNewTab').style.display = 'none';
  document.title = 'CaseLink MVP - HTML Showcase';

  buildNav();
}

function updateWelcomeStats(phases, pages) {
  const elP = document.getElementById('statPhases');
  const elPg = document.getElementById('statPages');
  if (elP) elP.textContent = phases;
  if (elPg) elPg.textContent = pages;
}

// ============================================================
// Open in New Tab
// ============================================================
function openInNewTab() {
  if (currentFile) window.open(currentFile, '_blank');
}

// ============================================================
// Sidebar Toggle (all screens)
// ============================================================
function collapseSidebar() {
  sidebarVisible = false;
  document.getElementById('sidebar').classList.add('hidden');
  document.querySelector('.main').classList.add('expanded');
}
function expandSidebar() {
  sidebarVisible = true;
  document.getElementById('sidebar').classList.remove('hidden');
  document.querySelector('.main').classList.remove('expanded');
}
function toggleSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
  } else {
    sidebarVisible ? collapseSidebar() : expandSidebar();
  }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ============================================================
// Hash Routing
// ============================================================
function loadFromHash() {
  const hash = location.hash;
  if (hash.startsWith('#page=')) {
    // Split hash: #page=file&section=xxx
    const parts = hash.slice(6).split('&section=');
    const file = decodeURIComponent(parts[0]);
    const section = parts[1] || null;
    const page = PAGES.find(p => p.file === file);
    if (page) {
      loadPage(page.file, 'Phase ' + page.phase, page.title, true, section);
      return;
    }
  }
  showWelcome(true);
}

window.addEventListener('popstate', loadFromHash);

// ============================================================
// Listen for section changes from iframes via postMessage
// ============================================================
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'section-change' && currentFile) {
    const base = '#page=' + encodeURIComponent(currentFile);
    const newHash = e.data.section ? base + '&section=' + e.data.section : base;
    history.replaceState(null, '', newHash);
  }
});

// ============================================================
// LLM Provider Config
// ============================================================
// LLM_PROVIDERS is loaded from config.json at init
let LLM_PROVIDERS = {};

// ── Cookie helpers ──
function setCookie(name, value, days) {
  var d = new Date();
  d.setTime(d.getTime() + (days || 365) * 24 * 60 * 60 * 1000);
  document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}
function getCookie(name) {
  var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : '';
}
function getLLMConfig() {
  var raw = getCookie('caselink_llm');
  if (!raw) return {};
  try { return JSON.parse(raw); } catch(e) { return {}; }
}
function saveLLMConfig(cfg) {
  setCookie('caselink_llm', JSON.stringify(cfg), 365);
}

// ── Settings UI ──
function openSettings() {
  var cfg = getLLMConfig();
  var body = document.getElementById('settingsBody');
  var html = '';
  Object.keys(LLM_PROVIDERS).forEach(function(key) {
    var p = LLM_PROVIDERS[key];
    var pcfg = cfg[key] || {};
    var hasKey = !!(pcfg.apiKey);
    var isOpen = hasKey ? '' : '';
    html += '<div class="provider-section">';
    html += '<div class="provider-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">';
    html += '<span class="provider-name"><strong>' + p.icon + '</strong> ' + p.label + '</span>';
    html += '<span class="provider-badge ' + (hasKey ? '' : 'inactive') + '">' + (hasKey ? 'API Key 설정됨' : '미설정') + '</span>';
    html += '</div>';
    html += '<div class="provider-body' + (hasKey ? '' : ' open') + '">';
    html += '<div class="setting-row"><label class="setting-label">API Key</label>';
    html += '<input type="password" class="setting-input" id="cfg_key_' + key + '" value="' + (pcfg.apiKey || '') + '" placeholder="API Key 입력..."></div>';
    html += '<div class="setting-row"><label class="setting-label">모델</label>';
    html += '<select class="setting-select" id="cfg_model_' + key + '">';
    p.models.forEach(function(m) {
      var sel = (pcfg.model === m || (!pcfg.model && m === p.defaultModel)) ? ' selected' : '';
      html += '<option value="' + m + '"' + sel + '>' + m + '</option>';
    });
    html += '</select></div>';
    html += '</div></div>';
  });
  body.innerHTML = html;
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveSettings() {
  var cfg = {};
  // config.json의 defaultProvider를 쿠키에도 저장
  if (window._configDefaultProvider) cfg._defaultProvider = window._configDefaultProvider;
  Object.keys(LLM_PROVIDERS).forEach(function(key) {
    var keyEl = document.getElementById('cfg_key_' + key);
    var modelEl = document.getElementById('cfg_model_' + key);
    var apiKey = keyEl ? keyEl.value.trim() : '';
    var model = modelEl ? modelEl.value : LLM_PROVIDERS[key].defaultModel;
    if (apiKey) cfg[key] = { apiKey: apiKey, model: model };
  });
  saveLLMConfig(cfg);
  closeSettings();
  // Show toast
  var toast = document.getElementById('saveToast');
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

// ============================================================
// Init — load config.json then render
// ============================================================
(async function init() {
  try {
    var res = await fetch('config.json');
    var cfg = await res.json();
    LLM_PROVIDERS = cfg.providers || {};
    window._configDefaultProvider = cfg.defaultProvider || 'gemini';
  } catch(e) {
    console.warn('config.json load failed, using empty config:', e);
  }
  loadFromHash();
})();
</script>
